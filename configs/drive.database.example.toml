# SDKWork Drive database configuration example.
# Use with: SDKWORK_DRIVE_CONFIG_FILE=./configs/drive.database.example.toml
# Prefer PostgreSQL for server, Docker, and Kubernetes deployments.
# SQLite is reserved for local/private lightweight mode and fast test coverage.
# Prefer password_file for production. Use password only when the TOML file is
# stored as a protected secret-bearing file.

[database]
engine = "postgresql"
host = "db.internal"
port = 5432
database = "sdkwork_drive"
username = "sdkwork_drive"
password_file = "./database.secret"
ssl_mode = "require"
max_connections = 16

[database_sqlite_example]
engine = "sqlite"
url = "sqlite://target/dev/sdkwork-drive.sqlite"
max_connections = 1

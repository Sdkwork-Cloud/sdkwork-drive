version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2026-02-20T00-00-00Z
    container_name: sdkwork-drive-minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:

[package]
name = "sdkwork-drive-gateway-assembly"
edition.workspace = true
version.workspace = true
description = "Generated gateway assembly for sdkwork-drive application HTTP plane."

[lib]
name = "sdkwork_drive_gateway_assembly"
path = "src/lib.rs"

[dependencies]
axum.workspace = true
tokio = { version = "1.48", features = ["macros", "rt-multi-thread"] }
sqlx.workspace = true
sdkwork-drive-http = { path = "../sdkwork-drive-http" }
sdkwork_routes_drive_app_api = { package = "sdkwork-routes-drive-app-api", path = "../sdkwork-routes-drive-app-api" }
sdkwork_routes_drive_backend_api = { package = "sdkwork-routes-drive-backend-api", path = "../sdkwork-routes-drive-backend-api" }
sdkwork_routes_drive_open_api = { package = "sdkwork-routes-drive-open-api", path = "../sdkwork-routes-drive-open-api" }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-drive-app-api
  labels:
    app.kubernetes.io/name: sdkwork-drive
    app.kubernetes.io/component: app-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-drive
      app.kubernetes.io/component: app-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-drive
        app.kubernetes.io/component: app-api
    spec:
      containers:
        - name: app-api
          # Replace REPLACE_WITH_RELEASE_DIGEST with the immutable digest from release evidence.
          image: registry.sdkwork.com/apps/sdkwork-drive/app-api@sha256:REPLACE_WITH_RELEASE_DIGEST
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18080
          env:
            - name: SDKWORK_DRIVE_APP_API_BIND
              value: "0.0.0.0:18080"
            - name: SDKWORK_DRIVE_RUNTIME_PROFILE
              value: production
            - name: SDKWORK_DRIVE_DEPLOYMENT_PROFILE
              value: cloud
            - name: SDKWORK_DRIVE_RUNTIME_TARGET
              value: server
            - name: SDKWORK_DRIVE_DOMAIN_OUTBOX_EMBEDDED_DISPATCH
              value: "false"
            - name: SDKWORK_DRIVE_RATE_LIMIT_TRUST_PROXY
              value: "true"
            - name: SDKWORK_DRIVE_RATE_LIMIT_BACKEND
              value: redis
            - name: SDKWORK_DRIVE_RATE_LIMIT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-drive-rate-limit
                  key: SDKWORK_DRIVE_RATE_LIMIT_REDIS_URL
            - name: SDKWORK_DRIVE_RATE_LIMIT_FAIL_CLOSED
              value: "true"
            - name: SDKWORK_DRIVE_UPLOAD_CONTENT_POLICY_MODE
              value: enforce
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
            - name: OTEL_SERVICE_NAME
              value: sdkwork-drive-app-api
            - name: SDKWORK_DRIVE_APP_API_RATE_LIMIT_WINDOW_SECONDS
              value: "60"
            - name: SDKWORK_DRIVE_APP_API_RATE_LIMIT_MAX_REQUESTS
              value: "600"
          envFrom:
            - secretRef:
                name: sdkwork-drive-database
            - secretRef:
                name: sdkwork-drive-iam
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sdkwork-drive-app-api
  labels:
    app.kubernetes.io/name: sdkwork-drive
    app.kubernetes.io/component: app-api
spec:
  selector:
    app.kubernetes.io/name: sdkwork-drive
    app.kubernetes.io/component: app-api
  ports:
    - name: http
      port: 18080
      targetPort: http
  type: ClusterIP
---

module: drive
owner: sdkwork-drive
tables:
  - table: drive_space
    domain: drive
    description: Top-level storage space.
    columns:
      - name: id
        type: bigint
      - name: uuid
        type: varchar(64)
      - name: tenant_id
        type: bigint
      - name: space_type
        type: varchar(32)
      - name: name
        type: varchar(255)
      - name: status
        type: varchar(32)
      - name: created_at
        type: timestamp
      - name: updated_at
        type: timestamp
  - table: drive_node
    domain: drive
    description: File/folder node metadata.
    columns:
      - name: id
        type: bigint
      - name: uuid
        type: varchar(64)
      - name: tenant_id
        type: bigint
      - name: space_id
        type: bigint
      - name: node_type
        type: varchar(32)
      - name: normalized_name
        type: varchar(255)
      - name: status
        type: varchar(32)
      - name: created_at
        type: timestamp
      - name: updated_at
        type: timestamp
